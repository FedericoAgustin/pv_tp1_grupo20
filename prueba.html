<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>River Plate Fan Page</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #333;
        }

        /* HEADER estilo River */
        header {
            background: linear-gradient(90deg, #ffffff 0%, #d50000 50%, #ffffff 100%);
            color: black;
            text-align: center;
            padding: 25px;
            border-bottom: 5px solid #d50000;
        }

        header h1 {
            font-size: 32px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 14px;
        }

        /* NAV */
        nav {
            background-color: #111;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #d50000;
        }

        /* CONTENEDOR */
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* TARJETAS */
        .card {
            background: white;
            border-left: 6px solid #d50000;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #d50000;
        }

        /* BOTÓN */
        button {
            background-color: #d50000;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #a80000;
        }

        /* FOOTER */
        footer {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-top: 3px solid #d50000;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            nav a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>

</head>

<body>

    <header>
        <h1>River Plate</h1>
        <p>Pasión, historia y gloria</p>
    </header>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Plantel</a>
        <a href="#">Historia</a>
        <a href="#">Títulos</a>
    </nav>

    <div class="container">

        <div class="card">
            <h2>Bienvenido Millonario</h2>
            <p>Esta es una página fan inspirada en el Club Atlético River Plate.</p>
            <button>Ver más</button>
        </div>

        <div class="card">
            <h2>Último partido</h2>
            <p>River Plate dejó todo en la cancha con su estilo ofensivo característico.</p>
        </div>

    </div>

    <footer>
        <p>© 2026 Página Fan de River Plate</p>
    </footer>

</body>
</html>
